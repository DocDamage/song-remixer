name: Backend Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('backend/requirements-dev.txt', '.github/workflows/backend-tests.yml') }}

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run backend test suite
        run: python -m unittest discover -s backend -p "test_*.py"