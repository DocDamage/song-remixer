name: Nightly Real Stem Split

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  nightly-real-stem-split:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SONG_REMIXER_RUN_REAL_STEM_SPLIT: "1"
      SONG_REMIXER_STEM_DEVICE: "cpu"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache Demucs models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/demucs
            ~/.cache/torch
          key: ${{ runner.os }}-demucs-${{ hashFiles('backend/requirements.txt', '.github/workflows/nightly-real-stem-split.yml') }}

      - name: Install audio tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg sox

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run real stem split integration test
        run: python -m unittest backend.test_integration.EndToEndApiTests.test_real_split_stems_fixture_when_enabled